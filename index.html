<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>巻物考古学 - 地底の秘宝 -</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <!-- Game Container -->
    <div id="game-container">
        <!-- Scrolling Ground -->
        <div id="driller-space">
            <div id="soil-layer" class="texture-overlay"></div>
            <div id="vein-container"></div>
            <div id="artifact-container"></div>
            <!-- Canvas for sparks and dust -->
            <canvas id="particle-canvas"></canvas>
        </div>

        <!-- Audio Toggle -->
        <button id="sound-toggle" title="音声を切り替え">🔇</button>

        <!-- Static Drill Unit -->
        <div id="drill-container">
            <div id="drill-unit">
                <svg viewBox="0 0 100 150">
                    <defs>
                        <linearGradient id="metal-grad" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#455a64" />
                            <stop offset="50%" stop-color="#cfd8dc" />
                            <stop offset="100%" stop-color="#455a64" />
                        </linearGradient>
                        <filter id="glow">
                            <feGaussianBlur stdDeviation="2" result="blur" />
                            <feComposite in="SourceGraphic" in2="blur" operator="over" />
                        </filter>
                    </defs>
                    <!-- Drill Shaft -->
                    <rect x="45" y="0" width="10" height="40" fill="#37474f" />
                    <!-- Drill Head (Cone) -->
                    <path d="M50,150 L90,40 L10,40 Z" fill="url(#metal-grad)" />
                    <!-- Spiral Lines -->
                    <path d="M15,50 Q50,60 85,70 M12,80 Q50,90 88,100 M25,120 Q50,130 75,140" fill="none" stroke="#263238" stroke-width="2" />
                    <!-- Heat GLOW layer (opacity controlled by JS) -->
                    <path id="drill-heat-overlay" d="M50,150 L90,40 L10,40 Z" fill="#ff3d00" fill-opacity="0" filter="url(#glow)" />
                </svg>
            </div>
            <div id="drill-sparks"></div>
        </div>

        <!-- HUD (Always Fixed) -->
        <div id="hud">
            <div class="hud-top">
                <div class="depth-counter">
                    <span class="label">現在の深度</span>
                    <span id="depth-value">0</span><span class="unit">m</span>
                </div>
                <div class="heat-meter-container">
                    <span class="label">ドリルの熱量</span>
                    <div class="heat-meter">
                        <div id="heat-fill"></div>
                    </div>
                </div>
            </div>
            
            <div class="hud-bottom">
                <button id="collection-btn">
                     発見済: <span id="found-count">0</span>/10
                </button>
                <div id="item-slots">
                    <div id="slot-cool" class="item-icon empty" title="冷却スプレー">❄️</div>
                    <div id="slot-sonar" class="item-icon empty" title="ソナードローン">📡</div>
                </div>
                <button id="upgrade-btn">ドリルを強化</button>
            </div>
        </div>

        <!-- Notification -->
        <div id="notification" class="hidden">
            <span class="message">遺品を発見しました！</span>
        </div>

        <!-- Collection Modal -->
        <div id="collection-modal" class="modal hidden">
            <div class="modal-content glass">
                <div class="modal-header">
                    <h2>地層遺物コレクション</h2>
                    <button id="close-collection">×</button>
                </div>
                <div id="artifacts-grid">
                    <!-- 動的に生成 -->
                </div>
            </div>
        </div>

        <!-- Upgrade Modal -->
        <div id="upgrade-modal" class="modal hidden">
            <div class="modal-content glass">
                <div class="modal-header">
                    <h2>ドリル工房</h2>
                    <button id="close-upgrade">×</button>
                </div>
                <div id="upgrades-list">
                    <!-- 動的に生成 -->
                </div>
            </div>
        </div>

        <!-- Intro -->
        <div id="intro-screen">
            <div class="glass intro-card">
                <h1>巻物考古学</h1>
                <p>画面をスクロールして地底を掘り進もう！<br>速すぎるとオーバーヒートしてしまいます。<br>地球の中心に眠る10個の遺物を探し出そう。</p>
                <button id="start-btn">採掘を開始する</button>
            </div>
        </div>

        <!-- Overheat Warning -->
        <div id="overheat-warning" class="hidden">オーバーヒート！</div>
    </div>

    <script src="game.js"></script>
</body>
</html>
